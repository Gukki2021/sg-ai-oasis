name: Scrape SG AI Events

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC (= 08:00, 14:00, 20:00, 02:00 SGT)
    - cron: '0 0,6,12,18 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase python-dateutil pytz

      - name: Run scraper
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape.py

      - name: Notify (optional)
        if: failure()
        run: |
          echo "Scraper failed — check logs above"
          # Add Slack/Discord webhook notification here if desired
